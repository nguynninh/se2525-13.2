<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SellerShop — Dashboard (HTML/CSS)</title>
    <link rel="stylesheet" href="./dashboard.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h1 class="brand">Dashboard</h1>
        <nav class="menu">
          <button class="menu-item active">
            <img src="./icons/Order.png" alt="Dashboard" />
            <span>Dashboard</span>
          </button>
          <button class="menu-item">
            <img src="./icons/Buy.png" alt="Product" />
            <span>Product</span>
          </button>
          <button class="menu-item">
            <img src="./icons/Document.png" alt="Delivery" />
            <span>Delivery</span>
          </button>
          <button class="menu-item">
            <img src="./icons/message.png" alt="Messages" />
            <span>Messages</span>
          </button>
          <button class="menu-item">
            <img src="./icons/Notification.png" alt="Notification" />
            <span>Notification</span>
          </button>
        </nav>
      </aside>

      <main class="main">
        <header class="header">
          <h2>Dashboard</h2>
          <div class="actions">
            <div class="avatar avatar-placeholder" aria-label="Profile avatar">A</div>
          </div>
        </header>

        <section class="content">
          <div class="stats">
            <div class="stat">
              <div class="dot dot-red"></div>
              <div class="texts">
                <p class="label">Total number of visitors</p>
                <p class="value">2.761</p>
              </div>
            </div>
            <div class="stat">
              <div class="dot dot-pink"></div>
              <div class="texts">
                <p class="label">Order</p>
                <p class="value">580</p>
              </div>
            </div>
            <div class="stat">
              <div class="dot dot-violet"></div>
              <div class="texts">
                <p class="label">Revenue</p>
                <p class="value">22.000.000₫</p>
              </div>
            </div>
            <div class="stat">
              <div class="dot dot-sky"></div>
              <div class="texts">
                <p class="label">Canceled</p>
                <p class="value">90</p>
              </div>
            </div>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h3>Total Product Sales</h3>
              <select class="select small">
                <option>past 6 months</option>
                <option>past year</option>
                <option>all time</option>
              </select>
            </div>
            <div class="chart-placeholder">
              <span>Chart placeholder</span>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
  
</html>
