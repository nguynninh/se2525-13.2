# ========================
# HTTPS - ADMIN
# ========================
server {
    listen 443 ssl;
    server_name admin.hiki.io.vn;

    ssl_certificate     /etc/letsencrypt/live/admin.hiki.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.hiki.io.vn/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    resolver 127.0.0.11 valid=30s;

    # Dynamic upstream resolution to prevent startup crashes
    location / {
        set $upstream_admin http://admin:80;
        proxy_pass $upstream_admin;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

