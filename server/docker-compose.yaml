version: '3.8'

services:
  se-postgres:
    container_name: se-postgres
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: se202513
      POSTGRES_DB: se_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - se-network

volumes:
  postgres_data:

networks:
  se-network: