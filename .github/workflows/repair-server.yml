name: Repair Server Environment

on: workflow_dispatch

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 34.27.61.12 >> ~/.ssh/known_hosts

      - name: Repair server repository
        env:
          SERVER_IP: 34.27.61.12
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh ${SERVER_USER}@${SERVER_IP} "
            echo 'Starting repair...'
            
            # 1. Backup .env if it exists
            if [ -f ~/server/server/.env ]; then
                echo 'Backing up .env...'
                cp ~/server/server/.env ~/.env.backup
            elif [ -f ~/server/.env ]; then
                 cp ~/server/.env ~/.env.backup
            fi
            
            # 2. Remove corrupted directory
            echo 'Removing corrupted directory...'
            rm -rf ~/server
            
            # 3. Re-clone repository
            # Assuming public repo or SSH key is set up on server
            echo 'Cloning repository...'
            git clone https://github.com/nguynninh/se2525-13.2.git ~/server
            
            # 4. Checkout development branch
            cd ~/server
            git checkout development
            
            # 5. Restore .env
            echo 'Restoring .env...'
            if [ -f ~/.env.backup ]; then
                # Restore to server/.env because existing docker-compose expects it there (or root .env if strictly following)
                # My previous docker-compose update pointed to ./server/.env
                cp ~/.env.backup ~/server/server/.env
                # Also copy to root just in case
                cp ~/.env.backup ~/server/.env
            fi
            
            echo 'Repair complete. Ready for deployment.'
          "
