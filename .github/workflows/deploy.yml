name: Deploy to Production

on:
  push:
    branches:
      - development
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 34.27.61.12 >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SERVER_IP: 34.27.61.12
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          # Create deployment directory if not exists
          ssh ${SERVER_USER}@${SERVER_IP} "mkdir -p ~/se2025-13.2-server"
          
          # Sync files to server (excluding node_modules and .git)
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'dist' \
            ./ ${SERVER_USER}@${SERVER_IP}:~/se2025-13.2-server/
          
          # Deploy on server
          ssh ${SERVER_USER}@${SERVER_IP} "cd ~/se2025-13.2-server && bash deploy.sh"

      - name: Verify deployment
        env:
          SERVER_IP: 34.27.61.12
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          echo "Checking if containers are running..."
          ssh ${SERVER_USER}@${SERVER_IP} "cd ~/se2025-13.2-server && docker compose ps"

      - name: Notify deployment status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "Deployment successful!"
          else
            echo "Deployment failed!"
          fi
